<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Basket ball game</title>
    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Happy+Monkey&family=Jersey+10&family=Orbitron&family=Raleway+Dots&display=swap"
        rel="stylesheet">
</head>

<body>


    <h2 id="heading"> Basket ball game counter</h2>


    <div id="first-container">
        <div id="q1-div">
            <p id="q1"> Quater 1</p>
        </div>


        <div id="first-container-second">
            <div>
                <p class="name-p">HOME</p>
                <div class="first-container-second-first">
                    <P class="p-number">
                        <b> 0 </b>
                    </P>
                </div>
            </div>

            <div>
                <P class="name-p">AWAY</P>
                <div class="first-container-second-first">
                    <p class="p-number">
                        <b> 0 </b>
                    </p>
                </div>
            </div>
        </div>

    </div>


    <div id="second-container">

        <div class="second-container-parts">
            <p class="name-p">Home Team </p>
            <div id="second-container-first-part1">
                <button>
                    <div class="second-container-first-part2">
                        <p class="inner-text-score">
                            <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px"
                                fill="#FFFFFF">
                                <path d="M440-440H200v-80h240v-240h80v240h240v80H520v240h-80v-240Z" />
                            </svg>
                        </p>

                        <p class="inner-text-score">
                            +1
                        </p>

                        <p class="inner-text-score">
                            Free Throw
                        </p>
                    </div>
                </button>
                <button>
                    <div class="second-container-first-part2">
                        <p class="inner-text-score">
                            <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px"
                                fill="#FFFFFF">
                                <path d="M440-440H200v-80h240v-240h80v240h240v80H520v240h-80v-240Z" />
                            </svg>
                        </p>

                        <p class="inner-text-score">
                            +2
                        </p>

                        <p class="inner-text-score">
                            Field Goal
                        </p>

                    </div>
                </button>
                <button class="inner-text-score">
                    <div class="second-container-first-part2">


                        <p class="inner-text-score">
                            <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px"
                                fill="#FFFFFF">
                                <path d="M440-440H200v-80h240v-240h80v240h240v80H520v240h-80v-240Z" />
                            </svg>
                        </p>

                        <p class="inner-text-score">
                            +3
                        </p>

                        <p class="inner-text-score">
                            Three Pointer
                        </p>

                    </div>
                </button>


            </div>

            <button class="snd-btn"></button>
                <div class="first-container-second-third">
                    
                    <p class="p-sub"> SUBTRACT POINT</p>
                        
                </div>
            </button>

        </div>

        <div class="second-container-parts">
            <p class="name-p">Away Team</p>


            <div id="second-container-second-part1">
                <button>
                    <div class="second-container-second-part2">

                        <p class="inner-text-score">
                            <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px"
                                fill="#FFFFFF">
                                <path d="M440-440H200v-80h240v-240h80v240h240v80H520v240h-80v-240Z" />
                            </svg>
                        </p>

                        <p class="inner-text-score">
                            +1
                        </p>

                        <p class="inner-text-score">
                            Free Throw
                        </p>

                    </div>
                </button>
                <button>
                    <div class="second-container-second-part2">

                        <p class="inner-text-score">
                            <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px"
                                fill="#FFFFFF">
                                <path d="M440-440H200v-80h240v-240h80v240h240v80H520v240h-80v-240Z" />
                            </svg>
                        </p>

                        <p class="inner-text-score">
                            +2
                        </p>

                        <p class="inner-text-score">
                            Field Goal
                        </p>

                    </div>
                </button>
                <button>
                    <div class="second-container-second-part2">

                        <p class="inner-text-score">
                            <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px"
                                fill="#FFFFFF">
                                <path d="M440-440H200v-80h240v-240h80v240h240v80H520v240h-80v-240Z" />
                            </svg>
                        </p>

                        <p class="inner-text-score">
                            +3
                        </p>

                        <p class="inner-text-score">
                            Three Pointer
                        </p>

                    </div>
                </button>
            </div>


          <button class="snd-btn"></button>
                <div class="first-container-second-third">
                    
                    <p class="p-sub"> SUBTRACT POINT</p>
                        
                </div>
            </button>

        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
